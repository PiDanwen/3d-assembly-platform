<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D模型搭建配置平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      color: white;
      padding: 40px;
    }
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 16px 48px;
      background: white;
      color: #667eea;
      font-size: 18px;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .features {
      display: flex;
      gap: 30px;
      margin-top: 50px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature {
      background: rgba(255,255,255,0.15);
      padding: 20px 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    .feature-icon { font-size: 28px; margin-bottom: 8px; }
    .feature-text { font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚙️</div>
    <h1>3D模型搭建配置平台</h1>
    <p>上传3D模型，自动解析零件<br>配置安装方向，预览装配过程</p>
    <a href="https://pidanwen.github.io/3d-assembly-platform/resource-list.html" class="btn">进入平台 →</a>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📦</div>
        <div class="feature-text">资源管理</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div class="feature-text">安装方向配置</div>
      </div>
      <div class="feature">
        <div class="feature-icon">👁️</div>
        <div class="feature-text">360°预览</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✈️</div>
        <div class="feature-text">飞入动画</div>
      </div>
    </div>
  </div>
</body>
</html>
